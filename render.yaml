services:
  - type: web
    name: sales-plan-dashboard
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: INGEST_API_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sales-plan-db
          property: connectionString

databases:
  - name: sales-plan-db
    databaseName: sales_dashboard
    user: sales_dashboard
    plan: free
